services:
  code-docs:
    container_name: code-docs
    build: .
    volumes:
      - ${HOST_CODE_DIR}:/code:ro
      - ${HOST_OUTPUT_DIR}:/output
    ports:
      - "${HTTP_PORT:-8000}:8000"
    environment:
      - CODE_DIR=/code
      - OUTPUT_DIR=/output
      - SIDEBAR_STYLE=${SIDEBAR_STYLE:-tree}
      - EXCLUDE_PROJECTS=${EXCLUDE_PROJECTS:-}
    restart: unless-stopped
