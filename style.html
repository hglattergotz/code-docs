<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-body: #f8fafc;
    --bg-surface: white;
    --bg-code: #f1f5f9;
    --bg-thead: #f1f5f9;
    --bg-row-even: #f8fafc;
    --bg-blockquote: #eff6ff;
    --border-color: #e2e8f0;
    --border-blockquote: #bfdbfe;
    --border-blockquote-left: #2563eb;
    --text-primary: #0f172a;
    --text-body: #334155;
    --text-paragraph: #475569;
    --text-code: #334155;
    --text-blockquote: #1e40af;
    --link-color: #2563eb;
    --hr-color: #e2e8f0;
    --img-border: #e2e8f0;
  }
  [data-theme="dark"] {
    --bg-body: #0f172a;
    --bg-surface: #1e293b;
    --bg-code: #1e293b;
    --bg-thead: #1e293b;
    --bg-row-even: #162032;
    --bg-blockquote: #1e293b;
    --border-color: #334155;
    --border-blockquote: #334155;
    --border-blockquote-left: #60a5fa;
    --text-primary: #e2e8f0;
    --text-body: #cbd5e1;
    --text-paragraph: #94a3b8;
    --text-code: #cbd5e1;
    --text-blockquote: #93c5fd;
    --link-color: #60a5fa;
    --hr-color: #334155;
    --img-border: #334155;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
    background: var(--bg-body) !important;
    color: var(--text-body) !important;
    line-height: 1.65 !important;
    padding: 32px 48px !important;
    max-width: 100% !important;
  }
  body > header, body > main, body > div, .container { max-width: 100% !important; margin: 0 auto; }
  /* Pandoc wraps content in these elements with --standalone */
  body > header { margin-bottom: 0; }
  body > header #title-block-header { margin-bottom: 0; }

  h1, h2, h3, h4, h5, h6 { color: var(--text-primary); font-weight: 700; }
  h1 { font-size: 32px; margin-top: 0; margin-bottom: 8px; }
  h2 { font-size: 20px; margin-top: 48px; margin-bottom: 16px; }
  h3 { font-size: 16px; margin-top: 32px; margin-bottom: 12px; font-weight: 600; }

  p { margin-bottom: 12px; font-size: 14px; color: var(--text-paragraph); line-height: 1.7; }
  strong { color: var(--text-primary); font-weight: 600; }

  a { color: var(--link-color); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Card-style sections for top-level content */
  section, article, .narrative { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 24px; }

  code {
    font-family: 'SF Mono', 'Fira Code', Menlo, Consolas, monospace;
    background: var(--bg-code);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    padding: 0.2em 0.4em;
    font-size: 12px;
    color: var(--text-code);
  }
  pre {
    background: var(--bg-code);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  pre code {
    background: none;
    border: none;
    border-radius: 0;
    padding: 0;
    font-size: 12px;
    white-space: pre-wrap;
  }

  blockquote {
    border-left: 3px solid var(--border-blockquote-left);
    background: var(--bg-blockquote);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    margin-bottom: 16px;
    border-right: 1px solid var(--border-blockquote);
    border-top: 1px solid var(--border-blockquote);
    border-bottom: 1px solid var(--border-blockquote);
  }
  blockquote p { font-size: 14px; color: var(--text-blockquote); margin-bottom: 6px; }
  blockquote p:last-child { margin-bottom: 0; }

  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
  thead th { background: var(--bg-thead); font-weight: 600; color: var(--text-primary); text-align: left; font-size: 12px; text-transform: uppercase; }
  th, td { padding: 12px 16px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
  tbody tr:nth-child(even) { background: var(--bg-row-even); }
  tbody tr:last-child td { border-bottom: none; }

  ul, ol { margin-bottom: 12px; padding-left: 1.5em; }
  li { margin-bottom: 6px; font-size: 14px; color: var(--text-paragraph); line-height: 1.6; }
  li > ul, li > ol { margin-top: 6px; margin-bottom: 6px; }

  hr { border: none; border-top: 1px solid var(--hr-color); margin: 32px 0; }

  img { max-width: 100%; border-radius: 8px; border: 1px solid var(--img-border); }

</style>
<script>
(function() {
  // Read theme from parent (same-origin iframe) or fall back to own detection
  var theme = 'light';
  try {
    var parentTheme = window.parent.document.documentElement.getAttribute('data-theme');
    if (parentTheme) theme = parentTheme;
  } catch(e) {}
  document.documentElement.setAttribute('data-theme', theme);

  // Listen for theme changes from parent
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'theme-change') {
      document.documentElement.setAttribute('data-theme', e.data.theme);
    }
  });
})();
</script>
