<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
    background: #f8fafc !important;
    color: #334155 !important;
    line-height: 1.65 !important;
    padding: 32px 48px !important;
    max-width: 100% !important;
  }
  body > header, body > main, body > div, .container { max-width: 100% !important; margin: 0 auto; }
  /* Pandoc wraps content in these elements with --standalone */
  body > header { margin-bottom: 0; }
  body > header #title-block-header { margin-bottom: 0; }

  h1, h2, h3, h4, h5, h6 { color: #0f172a; font-weight: 700; }
  h1 { font-size: 32px; margin-top: 0; margin-bottom: 8px; }
  h2 { font-size: 20px; margin-top: 48px; margin-bottom: 16px; }
  h3 { font-size: 16px; margin-top: 32px; margin-bottom: 12px; font-weight: 600; }

  p { margin-bottom: 12px; font-size: 14px; color: #475569; line-height: 1.7; }
  strong { color: #0f172a; font-weight: 600; }

  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Card-style sections for top-level content */
  section, article, .narrative { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 24px; }

  code {
    font-family: 'SF Mono', 'Fira Code', Menlo, Consolas, monospace;
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 4px;
    padding: 0.2em 0.4em;
    font-size: 12px;
    color: #334155;
  }
  pre {
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  pre code {
    background: none;
    border: none;
    border-radius: 0;
    padding: 0;
    font-size: 12px;
    white-space: pre-wrap;
  }

  blockquote {
    border-left: 3px solid #2563eb;
    background: #eff6ff;
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    margin-bottom: 16px;
    border-right: 1px solid #bfdbfe;
    border-top: 1px solid #bfdbfe;
    border-bottom: 1px solid #bfdbfe;
  }
  blockquote p { font-size: 14px; color: #1e40af; margin-bottom: 6px; }
  blockquote p:last-child { margin-bottom: 0; }

  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
  thead th { background: #f1f5f9; font-weight: 600; color: #0f172a; text-align: left; font-size: 12px; text-transform: uppercase; }
  th, td { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
  tbody tr:nth-child(even) { background: #f8fafc; }
  tbody tr:last-child td { border-bottom: none; }

  ul, ol { margin-bottom: 12px; padding-left: 1.5em; }
  li { margin-bottom: 6px; font-size: 14px; color: #475569; line-height: 1.6; }
  li > ul, li > ol { margin-top: 6px; margin-bottom: 6px; }

  hr { border: none; border-top: 1px solid #e2e8f0; margin: 32px 0; }

  img { max-width: 100%; border-radius: 8px; border: 1px solid #e2e8f0; }

</style>
